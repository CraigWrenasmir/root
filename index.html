<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ROOT</title>
<style>
  html,body{margin:0;padding:0;background:#120c07;height:100%;overflow:hidden;
            touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  #bark{position:fixed;inset:0;z-index:0;pointer-events:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
  canvas{image-rendering:pixelated}
  /* touch controls — BBS chrome, shown only on coarse pointers */
  #pad,#btns{position:fixed;bottom:max(12px, env(safe-area-inset-bottom));display:none;
             user-select:none;-webkit-user-select:none;touch-action:none;z-index:5}
  #pad{left:12px}
  #btns{right:12px;text-align:right}
  .tb{display:inline-block;font:700 22px 'Menlo','Consolas','Courier New',monospace;
      color:#59f2b0;background:rgba(2,10,6,.82);border:1px solid #1d4d33;
      border-radius:3px;padding:14px 0;text-align:center;margin:3px;
      width:66px;box-sizing:border-box}
  .tb:active,.tb.held{background:#123020;color:#d8fff0}
  .tb.wide{width:140px;font-size:16px;padding:17px 0}
  #pad .row{display:flex}
  #pad .sp{width:66px;margin:3px;visibility:hidden}
  /* landscape phone: tuck controls into the side margins, a touch smaller
     and more translucent so the playfield reads clearly through them */
  body.landscape .tb{opacity:.82;font-size:20px;padding:11px 0;width:58px}
  body.landscape .tb.wide{width:120px;font-size:15px;padding:13px 0}
  body.landscape #pad .sp{width:58px}
</style>
</head>
<body>
<canvas id="bark"></canvas>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="pad">
  <div class="row"><span class="tb sp"></span><span class="tb" data-k="up">▲</span><span class="tb sp"></span></div>
  <div class="row"><span class="tb" data-k="left">◀</span><span class="tb sp"></span><span class="tb" data-k="right">▶</span></div>
  <div class="row"><span class="tb sp"></span><span class="tb" data-k="down">▼</span><span class="tb sp"></span></div>
</div>
<div id="btns">
  <div><span class="tb wide" id="bQuery">[ QUERY ]</span></div>
  <div><span class="tb wide" id="bRoot">[ /ROOT ]</span></div>
</div>
<script>
"use strict";
/* ============================================================
   ROOT — a diagnostic render of the tree archive.
   Text mode. Everything on this screen is a character.
   Solar memory casings in the burled knots of trees, a public
   signal at 300 bits per second. The corruption is not data
   loss. It is meaning-production. STATUS: BEING READ.
   Nodes are grown nightly by engine/grow.py.
   From the ROOT layer of "Their Most August Public Organ"
   by C. W. Smith — novel.wrenasmir.com
   ============================================================ */

/* ---------- the terminal ---------- */
const COLS = 80, ROWS = 36;         // playfield rows 0..33, message rows 34-35
const PR = ROWS - 2;                // playfield height (border included)
const CW = 10, CH = 18;
const FONT = (CH-3)+"px 'Menlo','Consolas','Courier New',monospace";
const cv = document.getElementById("c");
cv.width = COLS*CW; cv.height = ROWS*CH;
const scr = cv.getContext("2d");
const bgC = document.createElement("canvas");    // pre-rendered static room
bgC.width = cv.width; bgC.height = cv.height;
const bctx = bgC.getContext("2d");
function fit(){
  let s = Math.min(innerWidth/(COLS*CW), innerHeight/(ROWS*CH));
  if(s >= 1) s = Math.floor(s);          // crisp integer scale on big screens
  cv.style.width  = (COLS*CW*s)+"px";
  cv.style.height = (ROWS*CH*s)+"px";
}
addEventListener("resize", fit); fit();
const IS_TOUCH = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;

/* ---------- the host tree ----------
   The casing is installed within a division of the heartwood, framed in
   bark. Everything outside the screen is the tree it lives in. */
const barkCv = document.getElementById("bark");
const bkx = barkCv.getContext("2d");
let ledCell = null;
function drawBark(){
  const dpr = 1;
  barkCv.width = innerWidth; barkCv.height = innerHeight;
  const BC = Math.ceil(innerWidth/CW), BR = Math.ceil(innerHeight/CH);
  const rnd = mulberry32(19960214);
  const browns = ["#2a2014","#382b1b","#453623","#524230","#241b10"];
  const cream = "#7a6a50", dark = "#0e0a06";
  bkx.fillStyle = "#120c07"; bkx.fillRect(0,0,barkCv.width,barkCv.height);
  bkx.font = FONT; bkx.textAlign = "center"; bkx.textBaseline = "middle";
  // where the screen sits (avoid drawing under it; frame it)
  const r = cv.getBoundingClientRect();
  const gx0 = Math.floor(r.left/CW)-1, gx1 = Math.ceil(r.right/CW)+1;
  const gy0 = Math.floor(r.top/CH)-1,  gy1 = Math.ceil(r.bottom/CH)+1;
  // burl: an ellipse of rings, placed clear of the screen
  const bx = (gx0 > BC-gx1) ? gx0*0.5 : gx1 + (BC-gx1)*0.5;
  const by = BR*0.3 + rnd()*BR*0.3;
  for(let y=0;y<BR;y++){
    for(let x=0;x<BC;x++){
      const inScreen = x>=gx0 && x<=gx1 && y>=gy0 && y<=gy1;
      if(inScreen) continue;
      // vertical bark strands with slow wobble
      const strand = Math.sin(x*0.55 + Math.sin(y*0.09)*2.1) + Math.sin(y*0.05+x*0.13)*0.4;
      // burl rings bend the strands
      const bd = Math.hypot((x-bx)/2.2, y-by);
      let ch2, col;
      if(bd < 1.6){ ch2 = "▓"; col = dark; }
      else if(bd < 7 && Math.abs(bd - Math.round(bd)) < 0.28){
        ch2 = ")("[Math.round(bd)%2]; col = browns[Math.round(bd)%browns.length];
      }
      else if(strand > 0.85){ ch2 = "║"; col = browns[(x%browns.length)]; }
      else if(strand > 0.55){ ch2 = rnd()<.5?")":"("; col = browns[(x*7+y)%browns.length]; }
      else if(strand < -0.9){ ch2 = "▒"; col = dark; }
      else if(rnd()<0.10){ ch2 = "░·'`,"[(rnd()*5)|0]; col = rnd()<.12?cream:browns[(rnd()*browns.length)|0]; }
      else continue;
      bkx.fillStyle = col;
      bkx.fillText(ch2, x*CW+CW/2, y*CH+CH/2+1);
    }
  }
  // the division of heartwood: a dark lip around the screen
  bkx.fillStyle = "#0a0704";
  for(let x=gx0;x<=gx1;x++){
    bkx.fillText("▄", x*CW+CW/2, gy0*CH+CH/2+1);
    bkx.fillText("▀", x*CW+CW/2, gy1*CH+CH/2+1);
  }
  for(let y=gy0;y<=gy1;y++){
    bkx.fillText("▐", gx0*CW+CW/2, y*CH+CH/2+1);
    bkx.fillText("▌", gx1*CW+CW/2, y*CH+CH/2+1);
  }
  // a second casing's LED, further along the trunk
  ledCell = [gx1+2 < BC ? (gx1+BC)>>1 : gx0>>1, Math.max(1, gy0-2)];
}
setInterval(()=>{
  if(!ledCell) return;
  bkx.fillStyle = "#0e0a06";
  bkx.fillRect(ledCell[0]*CW, ledCell[1]*CH, CW, CH);
  bkx.fillStyle = (Date.now()/900|0)%2 ? "#e8a33d" : "#5a3d18";
  bkx.font = FONT; bkx.textAlign="center"; bkx.textBaseline="middle";
  bkx.fillText("•", ledCell[0]*CW+CW/2, ledCell[1]*CH+CH/2+1);
}, 450);
addEventListener("resize", ()=>{ fit(); drawBark(); });
setTimeout(drawBark, 50);
if(IS_TOUCH){
  const w = document.getElementById("wrap");
  // portrait: pin to top so the controls have clear space below.
  // landscape: the grid is a wide shape — centre it so it fills the screen,
  // large and readable, with the controls floating in the side margins.
  function touchLayout(){
    if(innerWidth > innerHeight){          // landscape
      w.style.alignItems = "center";
      w.style.paddingTop = "0";
      document.body.classList.add("landscape");
    } else {                               // portrait
      w.style.alignItems = "flex-start";
      w.style.paddingTop = "max(10px, env(safe-area-inset-top))";
      document.body.classList.remove("landscape");
    }
  }
  touchLayout();
  addEventListener("resize", touchLayout);
  addEventListener("orientationchange", touchLayout);
}

function cellText(g, x, y, ch, fg, bg){
  if(bg){ g.fillStyle = bg; g.fillRect(x*CW, y*CH, CW, CH); }
  g.fillStyle = fg; g.font = FONT;
  g.textAlign = "center"; g.textBaseline = "middle";
  g.fillText(ch, x*CW + CW/2, y*CH + CH/2 + 1);
}
function text(g, str, x, y, fg, bg){
  for(let i=0;i<str.length;i++) cellText(g, x+i, y, str[i], fg, bg);
}
function ctext(g, str, y, fg, bg){ text(g, str, Math.round((COLS-str.length)/2), y, fg, bg); }

/* ---------- deterministic PRNG ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296;}}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

/* ---------- save ---------- */
const SAVE_KEY = "root.v1";
let save = {files:{}, visited:{}, regionsSeen:{}, lastRoom:null, sound:true};
try{ const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if(s) save = Object.assign(save, s); }catch(e){}
save.regionsSeen = save.regionsSeen || {};
function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch(e){} }

/* ---------- tiny synth ---------- */
let AC = null;
function blip(freq, dur=0.09, type="square", gain=0.03){
  if(!save.sound) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
function handshake(){ [420,480,420,560,640].forEach((f,i)=>setTimeout(()=>blip(f,.07,"square",.02), i*80)); }

/* ---------- world state ---------- */
let manifest = null;
let roomCache = {};
let room = null;         // current node (prepared)
let base = null;         // {ch,fg,solid} char grids for current node
let exitCells = {};      // "x,y" -> exit
let twinkles = [];       // blinking base cells (LEDs, cursors)
let weatherP = [];
let roomFx = [];
let msg = null;          // {lines:[], t, ttl}
let caption = null;
let filePos = null;
let downloading = null;
let glitchT = 0;
let mode = "boot";       // boot | play | void | files
let prevRoom = null, prevDir = null;
let trans = 0;
let bootLines = [], bootT = 0;
let regionCard = null;   // {name, t} — artpack title screen on first entry to a region
let photoMode = false;   // suppress all UI text for feed photographs
let nearMemory = false;  // true while the reader stands beside a reverie trigger

const player = {cx:40, cy:26, step:0};
const keys = {};
const OPP = {n:"s", s:"n", e:"w", w:"e"};

function exitCell(dir){
  return dir==="n" ? [COLS>>1, 0] : dir==="s" ? [COLS>>1, PR-1]
       : dir==="w" ? [0, PR>>1] : [COLS-1, PR>>1];
}
function spawnFrom(dir){
  const [x,y] = exitCell(dir);
  return dir==="n" ? [x, y+2] : dir==="s" ? [x, y-2]
       : dir==="w" ? [x+2, y] : [x-2, y];
}
function accents(){ const a = room && room.palette && room.palette.accents; return (a && a.length) ? a : ["#59f2b0","#ffd166","#7cc7ff"]; }

/* ---------- messages (in-grid, bottom two rows, paged — nothing is cut off) ---------- */
function say(content, ttl){
  let lines = [];
  if(Array.isArray(content)) content.forEach(c=>{ lines.push(...wrap(String(c), COLS-8)); });
  else lines = wrap(String(content), COLS-8);
  lines = lines.filter(l=>l!=="");
  if(!lines.length) return;
  const pages = [];
  for(let i=0;i<lines.length;i+=2) pages.push(lines.slice(i,i+2));
  msg = {pages, t:0, per:2.8, ttl: ttl || Math.max(4.4, pages.length*2.8 + 0.8)};
}
function wrap(s, w){
  const words = String(s).split(" "); const out = [""];
  for(const wd of words){
    if((out[out.length-1]+" "+wd).trim().length > w) out.push(wd);
    else out[out.length-1] = (out[out.length-1]+" "+wd).trim();
  }
  return out;
}

/* ---------- base grid helpers ---------- */
function newBase(){
  const ch = [], fg = [], bg = [], solid = [];
  for(let y=0;y<PR;y++){
    ch.push(new Array(COLS).fill(" "));
    fg.push(new Array(COLS).fill("#fff"));
    bg.push(new Array(COLS).fill(null));      // null = room bg
    solid.push(new Array(COLS).fill(false));
  }
  return {ch, fg, bg, solid};
}
function put(x, y, c, col, sol, bgc){
  x|=0; y|=0;
  if(x<0||x>=COLS||y<0||y>=PR) return;
  base.ch[y][x] = c; base.fg[y][x] = col;
  if(sol!==undefined && sol!==null) base.solid[y][x] = sol;
  if(bgc!==undefined) base.bg[y][x] = bgc;
}
function putBg(x, y, bgc, sol){
  x|=0; y|=0;
  if(x<0||x>=COLS||y<0||y>=PR) return;
  base.bg[y][x] = bgc;
  if(sol!==undefined) base.solid[y][x] = sol;
}
function putStr(x, y, s, col, sol, bgc){ for(let i=0;i<s.length;i++) put(x+i, y, s[i], col, sol, bgc); }
function cellBg(x, y){
  const rb = (room && room.palette && room.palette.bg) || "#07130c";
  if(!base || y<0 || y>=PR || x<0 || x>=COLS) return rb;
  return base.bg[y][x] || rb;
}
function shade(hex, f){
  // f > 0 lightens toward white, f < 0 darkens toward black
  const n = parseInt(hex.slice(1), 16);
  let r = (n>>16)&255, g = (n>>8)&255, b2 = n&255;
  if(f>=0){ r += (255-r)*f; g += (255-g)*f; b2 += (255-b2)*f; }
  else { r *= (1+f); g *= (1+f); b2 *= (1+f); }
  return "#"+((1<<24)|(Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(b2)).toString(16).slice(1);
}

/* ---------- ground motifs (character textures) ---------- */
function paintGround(r){
  const g = r.ground || {};
  const rnd = mulberry32((r.seed||1) ^ 0x9E3779B9);
  const gc = (r.palette && r.palette.ground && r.palette.ground.length) ? r.palette.ground : ["#12291b","#1b3a26"];
  const den = Math.min(1, Math.max(0.1, g.density==null?0.5:g.density));
  const motif = g.motif || "scatter";
  const C = (i)=>gc[i%gc.length];
  if(motif==="grid"){
    const step = Math.round(12 - den*5);
    for(let y=1;y<PR-1;y++) for(let x=1;x<COLS-1;x++){
      const gx = x%step===0, gy = y%(step>>1)===0;
      if(gx&&gy) put(x,y,"┼",C(0));
      else if(gx) put(x,y,"│",C(0));
      else if(gy) put(x,y,"─",C(0));
    }
  } else if(motif==="tiles"){
    for(let y=1;y<PR-1;y++) for(let x=1;x<COLS-1;x++){
      if(((x/6|0)+(y/3|0))%2===0 && rnd()<den) put(x,y,"░",C((x/6|0)%2));
    }
  } else if(motif==="qr"){
    // dense block noise in patches — the archive as texture
    const patches = 3+den*5;
    for(let p=0;p<patches;p++){
      const px = 2+(rnd()*(COLS-14)|0), py = 2+(rnd()*(PR-10)|0);
      const pw = 4+(rnd()*10|0), ph = 2+(rnd()*5|0);
      for(let y=py;y<py+ph&&y<PR-1;y++) for(let x=px;x<px+pw&&x<COLS-1;x++)
        if(rnd()<.75) put(x,y,"█▀▄▌▐░"[(rnd()*6)|0],C((rnd()*2)|0));
    }
  } else if(motif==="contour"){
    for(let i=0;i<3+den*5;i++){
      let y0 = 2+rnd()*(PR-4);
      for(let x=1;x<COLS-1;x++){
        const y = Math.round(y0 + Math.sin(x/9+i*2.1)*3.5 + Math.sin(x/3.4+i)*0.9);
        if(y>0&&y<PR-1) put(x,y,rnd()<.85?"~":"≈",C(i%2));
      }
    }
  } else if(motif==="canopy"){
    for(let i=0;i<den*90;i++){
      const x = 1+(rnd()*(COLS-2)|0), y = 1+(rnd()*(PR-2)|0);
      const c = "  ''..``,;"[(rnd()*10)|0];
      if(c!==" ") put(x,y,c,C((rnd()*2)|0));
      if(rnd()<.25) put(x+1,y,"▒",C(1));
    }
  } else if(motif==="static"){
    for(let i=0;i<den*900;i++)
      put(1+(rnd()*(COLS-2)|0), 1+(rnd()*(PR-2)|0), "·░▒:"[(rnd()*4)|0], C((rnd()*2)|0));
  } else if(motif==="waves"){
    for(let y=2;y<PR-2;y+=Math.round(4-den*1.5))
      for(let x=1;x<COLS-1;x++)
        if((x+y)%2===0) put(x,y,"~≈"[(y/2|0)%2],C((y/4|0)%2));
  } else if(motif==="circuit"){
    for(let i=0;i<den*14;i++){
      let x=2+(rnd()*(COLS-4)|0), y=2+(rnd()*(PR-4)|0);
      for(let s2=0;s2<3;s2++){
        const horiz = rnd()<.5, len = 3+(rnd()*10|0), sgn = rnd()<.5?-1:1;
        for(let k=0;k<len;k++){
          if(horiz){ x+=sgn; put(x,y,"─",C(0)); } else { y+=sgn; put(x,y,"│",C(0)); }
          if(x<2||x>COLS-3||y<2||y>PR-3) break;
        }
        put(x,y,"┼",C(1));
      }
      put(x,y,"▪",C(1));
    }
  } else if(motif==="ripple"){
    const cx = 10+(rnd()*(COLS-20)|0), cy = 5+(rnd()*(PR-10)|0);
    for(let y=1;y<PR-1;y++) for(let x=1;x<COLS-1;x++){
      const d = Math.round(Math.hypot((x-cx)/2, y-cy));
      if(d>0 && d%3===0) put(x,y,"·∙"[(d/3|0)%2],C((d/3|0)%2));
    }
  } else if(motif==="fields"){
    // big irregular colour fields, edge to edge — ANSI artpack ground
    const cols2 = [C(0), C(1), shade(C(0), .18), shade(C(1), -.25)];
    for(let p=0;p<4+den*4;p++){
      const bx = (rnd()*COLS)|0, by = 1+(rnd()*(PR-2)|0);
      const bw = 8+(rnd()*26|0), bh = 3+(rnd()*8|0);
      const col = cols2[(rnd()*cols2.length)|0];
      for(let y=by;y<by+bh&&y<PR-1;y++){
        const inset = (rnd()*3)|0;
        for(let x=Math.max(1,bx+inset);x<bx+bw-inset&&x<COLS-1;x++) putBg(x,y,col);
      }
    }
    for(let i=0;i<den*80;i++){
      const x = 1+(rnd()*(COLS-2)|0), y = 1+(rnd()*(PR-2)|0);
      put(x,y,".,'`·"[(rnd()*5)|0], shade(C(1), .35));
    }
  } else if(motif==="roads"){
    // thick solid bands crossing the node, like a village map
    const roadC = C(0), edgeC = shade(C(0), -.35);
    const ry = 3+(rnd()*(PR-8)|0);
    for(let x=1;x<COLS-1;x++) for(let dy=0;dy<3;dy++) putBg(x, ry+dy, dy===1?roadC:edgeC);
    const nvert = 1+(rnd()*2|0);
    for(let v=0;v<nvert;v++){
      const rx = 6+(rnd()*(COLS-14)|0);
      const up = rnd()<.5;
      for(let y=up?1:ry; y<(up?ry+3:PR-1); y++) for(let dx=0;dx<4;dx++) putBg(rx+dx, y, dx===0||dx===3?edgeC:roadC);
    }
    for(let i=0;i<den*100;i++){
      const x = 1+(rnd()*(COLS-2)|0), y = 1+(rnd()*(PR-2)|0);
      if(!base.bg[y][x]) put(x,y,"'.,·"[(rnd()*4)|0], C(1));
    }
  } else if(motif==="orchard"){
    // repeated-glyph rows: plantations, crowds, fences
    const glyphs = ["♠","♣","∩","▲","¶"][(rnd()*5)|0];
    for(let y=2;y<PR-2;y+=2+(rnd()*2|0)){
      let x = 1+(rnd()*6|0);
      while(x<COLS-2){
        const run = 3+(rnd()*10|0);
        for(let k=0;k<run&&x<COLS-2;k++,x+=2){ if(rnd()<den+.15) put(x,y,glyphs,C(0)); }
        x += 3+(rnd()*8|0);
      }
    }
    if(rnd()<.7){
      const fy = 2+(rnd()*(PR-4)|0);
      for(let x=2;x<COLS-2;x++) put(x,fy,x%6===0?"┬":"─",C(1));
    }
  } else if(motif==="board"){
    // full-bleed circuit board — traces, pads, solder points
    const boardC = C(0);
    for(let y=1;y<PR-1;y++) for(let x=1;x<COLS-1;x++) putBg(x,y,boardC);
    const traceC = shade(C(1), .3), padC = shade(boardC, .5);
    for(let i=0;i<10+den*14;i++){
      let x=2+(rnd()*(COLS-4)|0), y=2+(rnd()*(PR-4)|0);
      put(x,y,"o",padC);
      for(let s2=0;s2<3;s2++){
        const horiz = rnd()<.5, len = 4+(rnd()*14|0), sgn = rnd()<.5?-1:1;
        for(let k=0;k<len;k++){
          if(horiz){ x+=sgn; if(x<2||x>COLS-3) break; if(base.ch[y][x]===" ") put(x,y,"─",traceC); }
          else { y+=sgn; if(y<2||y>PR-3) break; if(base.ch[y][x]===" ") put(x,y,"│",traceC); }
        }
        if(x>1&&x<COLS-2&&y>1&&y<PR-3) put(x,y,"┼",traceC);
      }
      put(x,y,"o",padC);
    }
  } else if(motif==="gradient"){
    // CP437 artpack-header sky: banded colour with ░▒▓ dither seams
    const c3 = [shade(C(0), -.35), C(0), C(1)];
    const bandH = Math.max(4, Math.floor(PR/3));
    for(let y=1;y<PR-1;y++){
      const bi = Math.min(2, ((y-1)/bandH)|0);
      for(let x=1;x<COLS-1;x++) putBg(x,y,c3[bi]);
      const rem = bandH - ((y-1) - bi*bandH);
      if(bi<2 && rem<=2){
        for(let x=1;x<COLS-1;x++)
          if(rnd() < (rem===1?.6:.3)) put(x,y,rem===1?"▒":"░",c3[bi+1]);
      }
    }
    for(let i=0;i<den*40;i++)
      put(1+(rnd()*(COLS-2)|0), 1+(rnd()*(PR-2)|0), "·", shade(C(1), .4));
  } else { /* scatter */
    for(let i=0;i<den*220;i++)
      put(1+(rnd()*(COLS-2)|0), 1+(rnd()*(PR-2)|0), ".,'·`"[(rnd()*5)|0], C((rnd()*2)|0));
  }
}

/* ---------- border & routes ---------- */
function paintBorder(r){
  const dim = (r.palette && r.palette.ground && r.palette.ground[1]) || "#1b3a26";
  for(let x=0;x<COLS;x++){ put(x,0,"─",dim,true); put(x,PR-1,"─",dim,true); }
  for(let y=0;y<PR;y++){ put(0,y,"│",dim,true); put(COLS-1,y,"│",dim,true); }
  put(0,0,"┌",dim,true); put(COLS-1,0,"┐",dim,true);
  put(0,PR-1,"└",dim,true); put(COLS-1,PR-1,"┘",dim,true);
  exitCells = {};
  for(const ex of (r.exits||[])){
    const [x,y] = exitCell(ex.dir);
    const open = typeof ex.to==="string" && !ex.to.startsWith("NEW:") && manifest.roomIds[ex.to];
    const horiz = ex.dir==="n"||ex.dir==="s";
    for(let k=-2;k<=2;k++){
      const gx = horiz? x+k : x, gy = horiz? y : y+k;
      put(gx, gy, " ", "#000", !open && Math.abs(k)>0 ? false : false);
      exitCells[gx+","+gy] = ex;
    }
    ex._open = open;
    ex._cx = x; ex._cy = y;
  }
}

/* ---------- ASCII pieces (forms) ---------- */
function stampSprite(f, rnd){
  const hw = 2+(rnd()*3|0), hh = 2+(rnd()*3|0);
  const chars = "▓▒░█▄▀•";
  const x0 = f._cx, y0 = f._cy;
  for(let y=0;y<hh;y++) for(let x=0;x<hw;x++){
    if(rnd()<0.55){
      const c = chars[(rnd()*chars.length)|0], col = f._cols[(rnd()*f._cols.length)|0];
      put(x0+x, y0-hh+1+y, c, col, true);
      put(x0-1-x, y0-hh+1+y, c, col, true);
    }
  }
  f._bbox = [x0-hw-1, y0-hh, x0+hw, y0+1];
}
function stampStack(f, rnd){
  const n = 2+(rnd()*3|0);
  const x0 = f._cx, y0 = f._cy;
  let w = 4+(rnd()*6|0);
  for(let i=0;i<n;i++){
    const col = f._cols[(rnd()*f._cols.length)|0];
    const y = y0-i*2;
    const kind = (rnd()*4)|0;
    if(kind===0){ putStr(x0-(w>>1), y, "("+"═".repeat(Math.max(1,w-2))+")", col, true); }
    else if(kind===1){ putStr(x0-(w>>1), y, "<"+"≡".repeat(Math.max(1,w-2))+">", col, true); }
    else if(kind===2){ put(x0-(w>>1),y,"/",col,true); putStr(x0-(w>>1)+1,y,"▔".repeat(Math.max(1,w-2)),col,true); put(x0+(w>>1),y,"\\",col,true); }
    else { putStr(x0-(w>>1), y, "["+"▒".repeat(Math.max(1,w-2))+"]", col, true); }
    w = Math.max(2, w-2);
  }
  f._bbox = [x0-5, y0-n*2, x0+5, y0+1];
}
function stampTower(f, rnd){
  const x0 = f._cx, y0 = f._cy;
  const h = 4+(rnd()*4|0);
  let w = 5+(rnd()*4|0);
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length];
  for(let i=0;i<h;i++){
    const y = y0-i;
    if(i===h-1){ putStr(x0-(w>>1), y, "╔"+"═".repeat(w-2)+"╗", c0, true); }
    else {
      put(x0-(w>>1), y, "║", c0, true); put(x0+(w>>1), y, "║", c0, true);
      for(let k=1;k<w-1;k++) put(x0-(w>>1)+k, y, rnd()<.4?"▪":" ", c1, true);
    }
    if(i>0 && i%3===0) w = Math.max(3, w-2);
  }
  f._bbox = [x0-5, y0-h, x0+5, y0+1];
}
function stampArch(f, rnd){
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length];
  const w = 7, h = 5;
  putStr(x0-(w>>1), y0-h, "╔"+"═".repeat(w-2)+"╗", c1, true);
  for(let i=1;i<h;i++){
    put(x0-(w>>1), y0-h+i, "║", c1, true);
    put(x0+(w>>1), y0-h+i, "║", c1, true);
    for(let k=1;k<w-1;k++) put(x0-(w>>1)+k, y0-h+i, "▒", c0, i===h-1?false:true);
  }
  f._bbox = [x0-(w>>1)-1, y0-h, x0+(w>>1)+1, y0+1];
}
function stampPool(f, rnd){
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length];
  const rx = 5+(rnd()*3|0);
  for(let dy=-1;dy<=1;dy++){
    const w = Math.round(rx*Math.sqrt(1-(dy*dy)/2.2));
    for(let dx=-w;dx<=w;dx++)
      put(x0+dx, y0+dy, Math.abs(dx)===w ? "(" : "≈~"[(dx+dy+10)%2], Math.abs(dx)===w?c1:c0, false);
    put(x0+ (dy===0?rx:0), y0+dy, dy===0?")":"≈", c1, false);
  }
  f._bbox = [x0-rx-1, y0-2, x0+rx+1, y0+2];
}
function stampGlyph(f, rnd){
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length];
  const w = 12, h = 4;
  putStr(x0-(w>>1), y0-h, "┌"+"─".repeat(w-2)+"┐", c0, true);
  for(let i=1;i<h;i++){
    put(x0-(w>>1), y0-h+i, "│", c0, true); put(x0+(w>>1)-1, y0-h+i, "│", c0, true);
    let s = "";
    for(let k=0;k<w-3;k++) s += rnd()<.6 ? "¬°∙·─≡"[(rnd()*6)|0] : " ";
    putStr(x0-(w>>1)+1, y0-h+i, s, c1, true);
  }
  putStr(x0-(w>>1), y0, "└"+"─".repeat(w-2)+"┘", c0, true);
  f._bbox = [x0-(w>>1)-1, y0-h, x0+(w>>1)+1, y0+1];
}
function stampWireframe(f, rnd){
  // barely-3D: a survey-blue box with a false face behind it
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length];
  const w = 6+(rnd()*5|0), h = 3+(rnd()*3|0), d = 2;
  putStr(x0-(w>>1)+d, y0-h-d, "┌"+"─".repeat(w-2)+"┐", c1, true);
  for(let i=1;i<h;i++){
    put(x0-(w>>1)+d, y0-h-d+i, "│", c1, true);
    put(x0+(w>>1)+d-1, y0-h-d+i, "│", c1, true);
  }
  putStr(x0-(w>>1), y0-h, "┌"+"─".repeat(w-2)+"┐", c0, true);
  for(let i=1;i<h;i++){
    put(x0-(w>>1), y0-h+i, "│", c0, true);
    put(x0+(w>>1)-1, y0-h+i, "│", c0, true);
  }
  putStr(x0-(w>>1), y0, "└"+"─".repeat(w-2)+"┘", c0, true);
  put(x0-(w>>1)+1, y0-h-1, "/", c1, true);
  put(x0+(w>>1), y0-h-1, "/", c1, true);
  put(x0-(w>>1)+1, y0-1, "/", c1, true);
  put(x0+(w>>1), y0-1, "/", c1, true);
  f._bbox = [x0-(w>>1)-1, y0-h-d-1, x0+(w>>1)+d+1, y0+1];
}
function stampBurl(f, rnd){
  // eucalyptus with a burled knot: casing LED, bark plate, tubed antenna
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length], c2 = f._cols[2%f._cols.length];
  const h = 7+(rnd()*4|0);
  for(let i=0;i<h;i++){
    put(x0, y0-i, "║", c0, true);
    if(rnd()<.4) put(x0+(rnd()<.5?-1:1), y0-i, ")", c0, true);
  }
  // canopy
  for(let i=0;i<14;i++){
    const dx = (rnd()*9|0)-4, dy = -(h+(rnd()*3|0));
    put(x0+dx, y0+dy, "♠♣▒░"[(rnd()*4)|0], rnd()<.7?c1:c0, false);
  }
  // burl + casing
  const by = y0-(h*0.5|0);
  put(x0+1, by, "▓", c0, true);
  put(x0+2, by, "▐", c0, true);
  twinkles.push({x:x0+2, y:by-1, chars:"•·", col:c2, rate:1.6});
  put(x0+3, by-2, "/", c2, true);   // antenna
  f._bbox = [x0-5, y0-h-3, x0+4, y0+1];
}
function stampFilecard(f, rnd){
  // a standing directory listing, ZZT-signage style
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length], c2 = f._cols[2%f._cols.length];
  const w = 16, h = 6;
  putStr(x0-(w>>1), y0-h, "╔"+"═".repeat(w-2)+"╗", c0, true);
  putStr(x0-(w>>1), y0-h+1, "║/ROOT"+" ".repeat(w-8)+"║", c0, true);
  for(let i=2;i<h;i++){
    put(x0-(w>>1), y0-h+i, "║", c0, true); put(x0+(w>>1)-1, y0-h+i, "║", c0, true);
    let s = " ";
    const len = 2+(rnd()*(w-6)|0);
    for(let k=0;k<len;k++) s += "·∙─"[(rnd()*3)|0];
    putStr(x0-(w>>1)+1, y0-h+i, s.padEnd(w-2," "), c1, true);
  }
  putStr(x0-(w>>1), y0, "╚"+"═".repeat(w-2)+"╝", c0, true);
  twinkles.push({x:x0+(w>>1)-3, y:y0-1, chars:"▌ ", col:c2, rate:2.2});
  f._bbox = [x0-(w>>1)-1, y0-h, x0+(w>>1)+1, y0+1];
}
function stampHouse(f, rnd){
  // a tiny ANSI cottage: block roof, painted walls, a dark door
  const x0 = f._cx, y0 = f._cy;
  const c0 = f._cols[0], c1 = f._cols[1%f._cols.length];
  const w = 6+(rnd()*4|0);
  const wall = shade(c0, -.2), roof = c1;
  putStr(x0-(w>>1)+1, y0-3, "▄".repeat(w-2), roof, true);
  putStr(x0-(w>>1), y0-2, "▄"+"▀".repeat(w-2)+"▄", roof, true);
  for(let y2=y0-1;y2<=y0;y2++)
    for(let x2=x0-(w>>1);x2<=x0+(w>>1);x2++) put(x2, y2, " ", "#fff", true, wall);
  put(x0+(rnd()<.5?-1:1), y0, "▐", "#0a0a0a", true);            // door
  if(rnd()<.7) put(x0-(w>>2), y0-1, "▪", "#0a0a0a", true);       // window
  if(rnd()<.4){ put(x0+(w>>1)-1, y0-4, "│", wall, false); put(x0+(w>>1)-1, y0-5, "~", shade(c0,.4), false); } // chimney
  f._bbox = [x0-(w>>1)-1, y0-5, x0+(w>>1)+1, y0+1];
}
function stampChip(f, rnd){
  // a black IC block with pin dots and a part number
  const x0 = f._cx, y0 = f._cy;
  const c1 = f._cols[1%f._cols.length];
  const w = 8+(rnd()*6|0), h = 3+(rnd()*2|0);
  for(let y2=y0-h;y2<=y0;y2++)
    for(let x2=x0-(w>>1);x2<=x0+(w>>1);x2++) put(x2, y2, " ", "#fff", true, "#0d0d0d");
  for(let x2=x0-(w>>1)+1;x2<x0+(w>>1);x2+=2){
    put(x2, y0-h, "○", "#e8e8e8", true, "#0d0d0d");
    put(x2, y0, "○", "#e8e8e8", true, "#0d0d0d");
  }
  const label = String((f.form.seed||8086)).slice(0,4);
  putStr(x0-(label.length>>1), y0-(h>>1), label, c1, true, "#0d0d0d");
  f._bbox = [x0-(w>>1)-1, y0-h-1, x0+(w>>1)+1, y0+1];
}
const STAMPS = {sprite:stampSprite, stack:stampStack, tower:stampTower, arch:stampArch,
                pool:stampPool, glyph:stampGlyph, wireframe:stampWireframe,
                burl:stampBurl, filecard:stampFilecard, house:stampHouse, chip:stampChip};

/* ---------- room build ---------- */
function prepRoom(r){
  const a = (r.palette && r.palette.accents && r.palette.accents.length) ? r.palette.accents : ["#59f2b0","#ffd166","#7cc7ff"];
  (r.features||[]).forEach((f,i)=>{
    f._cx = Math.round(Math.min(.92,Math.max(.08,f.x==null?.5:f.x))*COLS);
    f._cy = Math.round(Math.min(.90,Math.max(.16,f.y==null?.5:f.y))*PR);
    f._seed = (r.seed||1) ^ hashStr(f.name||("f"+i));
    const ci = (f.form && f.form.colors) || null;
    f._cols = ci ? ci.map(j=>a[Math.abs(j)%a.length]) : a;
    if(!f.form) f.form = {type:"sprite", seed:f._seed, size:2};
    if(!STAMPS[f.form.type]) f.form.type = "sprite";
  });
  return r;
}
function buildRoom(r){
  base = newBase(); twinkles = [];
  paintGround(r);
  for(const f of (r.features||[]).slice().sort((p,q)=>p._cy-q._cy))
    STAMPS[f.form.type](f, mulberry32(f.form.seed||f._seed));
  paintBorder(r);
  // pre-render static layer (per-cell painted backgrounds — the ANSI look)
  const roomBg = (r.palette && r.palette.bg) || "#07130c";
  bctx.fillStyle = roomBg;
  bctx.fillRect(0,0,bgC.width,bgC.height);
  for(let y=0;y<PR;y++) for(let x=0;x<COLS;x++){
    if(base.bg[y][x]){
      bctx.fillStyle = base.bg[y][x];
      bctx.fillRect(x*CW, y*CH, CW, CH);
    }
    if(base.ch[y][x] !== " ") cellText(bctx, x, y, base.ch[y][x], base.fg[y][x]);
  }
}

/* ---------- room loading ---------- */
async function fetchJSON(path){
  const r = await fetch(path, {cache:"no-store"});
  if(!r.ok) throw new Error(path+" → "+r.status);
  return r.json();
}
async function loadRoom(id, enterDir){
  let r = roomCache[id];
  if(!r){
    try{ r = prepRoom(await fetchJSON("rooms/"+id+".json")); roomCache[id]=r; }
    catch(e){ enterVoid(enterDir); return; }
  }
  room = r; mode = "play";
  buildRoom(room); initWeather();
  roomFx = []; downloading = null; glitchT = 0;
  const [sx,sy] = enterDir ? spawnFrom(enterDir) : [COLS>>1, PR-4];
  player.cx = sx; player.cy = sy;
  save.lastRoom = id;
  if(!save.visited[id]) save.visited[id] = true;
  persist();
  filePos = null;
  if(room.file && !save.files[id]){
    const rnd = mulberry32((room.seed||1)^0xF11E);
    let fx2, fy2, tries = 0;
    do{ fx2 = 6+(rnd()*(COLS-12)|0); fy2 = 4+(rnd()*(PR-8)|0); tries++; }
    while(base.solid[fy2][fx2] && tries<40);
    filePos = [fx2, fy2];
  }
  caption = {title:room.title||id, region:room.region||"", insc:room.inscription||"", t:0};
  if(window.ROOT_NATIVE && ROOT_NATIVE.entered && !window.__rootEntered){
    window.__rootEntered = true; ROOT_NATIVE.entered();
  }
  if(room.region && !save.regionsSeen[room.region]){
    save.regionsSeen[room.region] = true; persist();
    regionCard = {name: room.region, t: 0};
    handshake();
    if(window.ROOT_NATIVE) ROOT_NATIVE.haptic("region");
  }
  trans = 1;
}
function enterVoid(fromDir){
  mode = "void"; trans = 1;
  prevDir = fromDir || "s";
  const [sx,sy] = spawnFrom(fromDir||"s");
  player.cx = sx; player.cy = sy;
  blip(120,.5,"sawtooth",.02);
}

/* ---------- weather ---------- */
function initWeather(){
  weatherP = [];
  const wt = room.weather||"none";
  if(wt==="none") return;
  const n = wt==="static" ? 70 : 30;
  const rnd = mulberry32((room.seed||1)^777);
  for(let i=0;i<n;i++) weatherP.push({x:rnd()*COLS, y:rnd()*PR, s:.3+rnd(), r:rnd()*7});
}
const WCHAR = {rain:"/", leaves:"~", drift:"·", static:"░", motes:"∙"};
function drawWeather(dt, t){
  const wt = room.weather||"none";
  if(wt==="none") return;
  const a = accents();
  for(const p of weatherP){
    if(wt==="rain"){ p.y += 14*dt*p.s; p.x -= 4*dt*p.s; }
    else if(wt==="leaves"){ p.y += 2.2*dt*p.s; p.x += Math.sin(t*.9+p.r)*.12; }
    else if(wt==="drift"){ p.y -= 1.2*dt*p.s; p.x += Math.sin(t*.7+p.r)*.06; }
    else if(wt==="static"){ if(Math.random()<.2){ p.x=Math.random()*COLS; p.y=Math.random()*PR; } }
    else if(wt==="motes"){ p.x += Math.sin(t+p.r)*.05; p.y += Math.cos(t*.8+p.r)*.05; }
    if(p.y>PR-1){ p.y=1; p.x=Math.random()*COLS; }
    if(p.y<1){ p.y=PR-2; }
    if(p.x>COLS-1) p.x=1; if(p.x<1) p.x=COLS-2;
    const cx2 = p.x|0, cy2 = p.y|0;
    if(cx2>0&&cx2<COLS-1&&cy2>0&&cy2<PR-1 && base.ch[cy2][cx2]===" ")
      cellText(scr, cx2, cy2, WCHAR[wt], a[(p.s*a.length)|0]);
  }
}

/* ============================================================
   REVERIE — the memory layer. A side-on tableau of Leif & Katita
   surfaces when the reader queries a private thing; a beat of
   narrative pages past; then the mesh returns. Warm palette,
   living motion. Scenes are data, so the engine can dream new ones.
   ============================================================ */
const revC = document.createElement("canvas");
revC.width = cv.width; revC.height = cv.height;
const rct = revC.getContext("2d");
let reverie = null;   // {scene, page, t, anim:[]}

function rCell(x,y,ch,fg,bg){ if(bg){rct.fillStyle=bg;rct.fillRect(x*CW,y*CH,CW,CH);}
  if(ch&&ch!==" "){rct.fillStyle=fg;rct.fillText(ch,x*CW+CW/2,y*CH+CH/2+1);} }
function rStr(x,y,s,fg,bg){ for(let i=0;i<s.length;i++) rCell(x+i,y,s[i],fg,bg); }
function rFill(y,x0,x1,ch,fg,bg){ for(let x=x0;x<=x1;x++) rCell(x,y,ch,fg,bg); }
function rBlock(cx,baseY,lines,fg){ const h=lines.length;
  for(let i=0;i<h;i++){const row=lines[i],yy=baseY-(h-1-i),x0=cx-(row.length>>1);
    for(let j=0;j<row.length;j++) if(row[j]!==" ") rCell(x0+j,yy,row[j],fg);} }
// left-anchored: for asymmetric poses (seated) where centring would distort
function rBlockAt(x0,baseY,lines,fg){ const h=lines.length;
  for(let i=0;i<h;i++){const row=lines[i],yy=baseY-(h-1-i);
    for(let j=0;j<row.length;j++) if(row[j]!==" ") rCell(x0+j,yy,row[j],fg);} }

// figures (kept minimal & iconic, as Craig likes them). L=Leif, K=Katita.
const FIG = {
  L_stand:["(¬","/│\\"," │","/ \\"],  K_stand:["﹏","(°","/│\\","╱▓╲"],
  L_wade:["(¬","/│\\"],               K_wade:["﹏","(°","/│\\"],
  K_lie:["        .-.","  ╭─────( ° )","  °˃˃˃˃˃  '-'"], L_kneel:["(¬ ","/│╲","▟▄▖"],
  // seated side-on, facing right: head · vertical back · hip curving to thigh · dangling shin
  L_sit:["(¬","│","╰─┐","  │"],  K_sit:["﹏","(°","│","╰─┐","  │"],
  // mid-stride, walking together

  petals(a){ const r=mulberry32(31); for(let i=0;i<10;i++)a.push({k:"drift",x:r()*COLS,y:r()*24,vy:-.3,vx:.15,ch:"✽*.",c:"#ffd9e6"}); },
  rain(a){ const r=mulberry32(32); for(let i=0;i<26;i++)a.push({k:"drift",x:r()*COLS,y:r()*24,vy:2.2,vx:-.5,ch:"/",c:"#8aa0b8"}); },
  snow(a){ const r=mulberry32(33); for(let i=0;i<18;i++)a.push({k:"drift",x:r()*COLS,y:r()*24,vy:.4,vx:.05,ch:"·*",c:"#e8eef4"}); },
  embers(a){ const r=mulberry32(34); for(let i=0;i<12;i++)a.push({k:"drift",x:r()*COLS,y:12+r()*12,vy:-.5,vx:.1,ch:"·°",c:"#ff9e4f"}); },
  static(a){ for(let i=0;i<20;i++)a.push({k:"static"}); },
  motes(a){ const r=mulberry32(36); for(let i=0;i<12;i++)a.push({k:"drift",x:r()*COLS,y:r()*24,vy:-.1,vx:.05,ch:"∙·",c:"#e8d0a0"}); },
};
function composeReverie(scene, anim){
  const sky = R_SKY[scene.sky] || R_SKY.dusk;
  const land = R_LAND[scene.land] || R_LAND.paddock;
  const struct = R_STRUCT[scene.structure] || R_STRUCT.none;
  const weather = R_WEATHER[scene.weather] || R_WEATHER.none;
  const hor = sky(anim);
  const g = land(hor, anim) || {gy:22};
  struct(g.gy, anim);
  placeFigures(scene.pose, scene.land, g.gy, g.wl, anim);
  weather(anim);
}

function enterReverie(scene){
  reverie = {scene, page:0, t:0, anim:[]};
  for(const k in keys) keys[k]=false;
  rct.font = FONT; rct.textAlign = "center"; rct.textBaseline = "middle";
  rct.fillStyle = "#0a0705"; rct.fillRect(0,0,revC.width,revC.height);
  if(REV_SETTINGS[scene.setting]) REV_SETTINGS[scene.setting](scene, reverie.anim);
  else composeReverie(scene, reverie.anim);
  // faint scanlines: this is a rendered memory, not the world
  rct.fillStyle = "rgba(10,6,4,.30)";
  for(let y=0;y<ROWS;y+=2) rct.fillRect(0,y*CH,revC.width,CH);
  mode = "reverie"; trans = 1;
  blip(330,.5,"sine",.02);
  if(window.ROOT_NATIVE) ROOT_NATIVE.haptic("region");
}
function reverieAdvance(){
  if(!reverie) return;
  const pages = Math.ceil((reverie.scene.narr||[]).length/2);
  if(reverie.page < pages-1){ reverie.page++; blip(300,.05,"sine",.015); }
  else { mode = "play"; reverie = null; trans = 1; blip(392,.08,"sine",.02);
    if(window.ROOT_NATIVE) ROOT_NATIVE.haptic("open"); }
}
function drawReverie(dt){
  reverie.t += dt; const t = reverie.t;
  scr.drawImage(revC, 0, 0);
  // motion overlays
  for(const a of reverie.anim){
    if(a.k==="twinkle"){ const on=(t*1.7+a.x*0.3)%2<1;
      cellText(scr,a.x,a.y,on?"·":" ",a.c[on?0:1],a.bg||cellBgRev(a.x,a.y)); }
    else if(a.k==="drift"){ a.x+=(a.vx||0)*dt*6; a.y+=(a.vy||0)*dt*6;
      if(a.y<11)a.y=24; if(a.y>25)a.y=12; if(a.x<0)a.x=COLS-1; if(a.x>COLS-1)a.x=0;
      cellText(scr,a.x|0,a.y|0,a.ch[(t*2+a.x)%a.ch.length|0],a.c); }
    else if(a.k==="shimmer"){ const sy=a.y0+((t*3)%(a.y1-a.y0+2));
      for(let x=a.x0;x<=a.x1;x++) if(Math.random()<.5) cellText(scr,x,sy|0,"·","rgba(255,240,220,.5)"); }
    else if(a.k==="ripple"){ const r=(t%2); const rr=Math.round(r*5);
      cellText(scr,a.x-rr,a.y,"(","#5a8aac"); cellText(scr,a.x+rr,a.y,")","#5a8aac"); }
    else if(a.k==="flutter"){ if((t*3|0)%3===0) cellText(scr,a.x,a.y,"▬",a.c); }
    else if(a.k==="fan"){ cellText(scr,a.x,a.y,["✜","✛","×","✛"][(t*4|0)%4],"#8a6a50"); }
    else if(a.k==="beam"){ const yy=a.y; for(let i=1;i<10;i++){const bx=a.x+i,by=yy-Math.round(i*.3);
      if((t*3+i)%2<1.4) cellText(scr,bx,by,"·","rgba(255,240,180,"+(0.5-i*0.04)+")"); } }
    else if(a.k==="static"){ if(Math.random()<.5) cellText(scr,(Math.random()*COLS)|0,1+(Math.random()*22)|0,"░·"[(Math.random()*2)|0],"rgba(200,210,220,.4)"); }
    else if(a.k==="flash"){ if(Math.sin(t*0.7)>0.985){ for(let x=0;x<COLS;x++) for(let y=1;y<10;y++) if(Math.random()<.3) cellText(scr,x,y,"▒","rgba(220,225,240,.5)"); } }
  }
  // title
  const title = reverie.scene.title || "REVERIE";
  rStrScr(4,1,title,"#a08a6a");
  for(let x=4;x<4+title.length;x++) cellText(scr,x,2,"─","#3a2e1e");
  // narrative box
  for(let y=27;y<=34;y++) for(let x=0;x<COLS;x++) cellText(scr,x,y," ","#000","#0d0906");
  text(scr,"┌"+"─".repeat(COLS-6)+"┐",2,27,"#4a3a2a");
  text(scr,"└"+"─".repeat(COLS-6)+"┘",2,34,"#4a3a2a");
  const narr = reverie.scene.narr||[];
  narr.slice(reverie.page*2, reverie.page*2+2).forEach((l,i)=>text(scr,l.slice(0,COLS-12),6,29+i*2,"#e8d4b8"));
  const pages = Math.ceil(narr.length/2);
  ctext(scr, reverie.page<pages-1 ? "» more" : "» return to the mesh", 33,
        reverie.page<pages-1 ? "#8a7a5a" : "#6a8a6a");
}
function rStrScr(x,y,s,col){ text(scr,s,x,y,col); }
function cellBgRev(x,y){ return "#160a1e"; }

/* ---------- verbs / fx (character effects) ---------- */
function triggerVerb(f){
  if((f.verb==="reverie" || f.scene) && (f.scene || room.reverie)){
    enterReverie(f.scene || room.reverie); return;
  }
  const v = f.verb || "hum";
  roomFx.push({type:v, cx:f._cx, cy:f._cy-2, t:0, cols:f._cols});
  if(v==="glitch") glitchT = 0.6;
  const tones = {ripple:392, bloom:523, scatter:311, glitch:196, torus:440, hum:262, open:587};
  blip(tones[v]||330, .12, v==="glitch"?"sawtooth":"triangle", .035);
  if(window.ROOT_NATIVE) ROOT_NATIVE.haptic(v);
  say([(f.name||"it").toUpperCase(), f["desc-on-touch"]||""]);
}
function drawFx(dt){
  for(const fx of roomFx){
    fx.t += dt;
    const t = fx.t, c = fx.cols;
    if(fx.type==="ripple"||fx.type==="torus"){
      const r = Math.round(t*10);
      for(let a2=0;a2<16;a2++){
        const th = a2/16*Math.PI*2;
        const x = Math.round(fx.cx+Math.cos(th)*r*1.6), y = Math.round(fx.cy+Math.sin(th)*r*.7);
        if(x>0&&x<COLS-1&&y>0&&y<PR-1) cellText(scr, x, y, fx.type==="torus"?"o":"·", c[0]);
      }
    } else if(fx.type==="bloom"){
      for(let i=0;i<8;i++){
        const th = i/8*Math.PI*2+t;
        const x = Math.round(fx.cx+Math.cos(th)*t*8), y = Math.round(fx.cy+Math.sin(th)*t*4);
        if(x>0&&x<COLS-1&&y>0&&y<PR-1) cellText(scr, x, y, "*", c[i%c.length]);
      }
    } else if(fx.type==="scatter"){
      const rnd = mulberry32(1234);
      for(let i=0;i<12;i++){
        const th = rnd()*7, sp = 3+rnd()*8;
        const x = Math.round(fx.cx+Math.cos(th)*t*sp), y = Math.round(fx.cy+Math.sin(th)*t*sp*.5 - t*t*3);
        if(x>0&&x<COLS-1&&y>0&&y<PR-1) cellText(scr, x, y, "·∙*"[(i%3)], c[i%c.length]);
      }
    } else if(fx.type==="open"){
      for(let y=Math.max(1,fx.cy-6); y<=fx.cy; y++)
        if(Math.random()<.7) cellText(scr, fx.cx, y, "▒", c[0]);
    } else { /* hum */
      for(let dx=-6;dx<=6;dx++){
        const y = Math.round(fx.cy-1+Math.sin(dx/1.5+t*16)*1.2);
        const x = fx.cx+dx;
        if(x>0&&x<COLS-1&&y>0&&y<PR-1) cellText(scr, x, y, "~", c[0]);
      }
    }
  }
  roomFx = roomFx.filter(f=>f.t<1.1);
}

/* ---------- movement ---------- */
let stepT = 0;
function tryMove(dt){
  stepT -= dt;
  if(downloading) return;
  let dx=0, dy=0;
  if(keys.up) dy=-1; else if(keys.down) dy=1;
  else if(keys.left) dx=-1; else if(keys.right) dx=1;
  if(!dx&&!dy) { stepT = 0; return; }
  if(stepT>0) return;
  stepT = 0.085;
  attemptStep(dx, dy);
}
function attemptStep(dx, dy){
  if(downloading) return;
  const nx = player.cx+dx, ny = player.cy+dy;
  // exits
  const ex = exitCells[nx+","+ny];
  if(ex && mode==="play"){
    prevRoom = room.id;
    if(ex._open){ blip(523,.08,"sine",.03); loadRoom(ex.to, OPP[ex.dir]); }
    else enterVoid(OPP[ex.dir]);
    return;
  }
  if(nx<1||nx>COLS-2||ny<1||ny>PR-2){
    if(mode==="void"){ loadRoom(prevRoom, OPP[prevDir]); }
    return;
  }
  if(mode==="play" && base.solid[ny][nx]) { blip(140,.03,"square",.008); if(window.ROOT_NATIVE) ROOT_NATIVE.haptic("bump"); return; }
  player.cx = nx; player.cy = ny;
  // route stub hint when standing beside a closed exit
  for(const ex2 of (room?room.exits||[]:[])){
    if(!ex2._open && Math.abs(player.cx-ex2._cx)+Math.abs(player.cy-ex2._cy)<4 && !ex2._said){
      say([("a route: "+(ex2.label||"")).slice(0,COLS-6), "(the mesh has not grown this yet)"], 2.6);
      ex2._said = true; setTimeout(()=>ex2._said=false, 6000);
    } else if(ex2._open && Math.abs(player.cx-ex2._cx)+Math.abs(player.cy-ex2._cy)<4 && !ex2._said){
      say([("a route: "+(ex2.label||"")).slice(0,COLS-6)], 2.2);
      ex2._said = true; setTimeout(()=>ex2._said=false, 6000);
    }
  }
}

/* ---------- query ---------- */
function interact(){
  if(mode!=="play"||!room) return;
  let best = null, bd = 1e9;
  for(const f of room.features||[]){
    const b = f._bbox || [f._cx-2,f._cy-2,f._cx+2,f._cy+2];
    const inX = player.cx>=b[0]-1 && player.cx<=b[2]+1;
    const inY = player.cy>=b[1]-1 && player.cy<=b[3]+1;
    if(inX&&inY){
      const d = Math.abs(player.cx-f._cx)+Math.abs(player.cy-f._cy);
      if(d<bd){ bd=d; best=f; }
    }
  }
  if(best) triggerVerb(best);
  else if(room.inscription){
    say("the node returns: “"+room.inscription+"”");
    blip(220,.2,"sine",.02);
  }
}

function drawFilesScreen(t){
  scr.fillStyle = "#010804"; scr.fillRect(0,0,cv.width,cv.height);
  text(scr, "╔"+"═".repeat(COLS-4)+"╗", 1, 0, "#1d4d33");

  text(scr, "STATUS: BEING READ — "+read+(read===1?" node has":" nodes have")+" read you", 3, 4, "#4d8b68");
  const ids = Object.keys(save.files);
  if(!ids.length){
    ctext(scr, "no files downloaded. every node carries one, at 300bps.", 12, "#4d8b68");
  } else {
    const top = 6, bottom = ROWS-4;
    const pages = [[]];
    let y = top;
    for(const id of ids){
      const b = save.files[id];
      const nl = wrap("· "+(b.name||id), COLS-10);

        pages.push([]); y = top;

      for(const l of nl){ pages[pages.length-1].push([l, 4, y, "#d8f5e4"]); y++; }
      for(const l of tl){ pages[pages.length-1].push([l, 7, y, "#5fa87f"]); y++; }
      y++;
    }
    filesPage = Math.max(0, Math.min(filesPage, pages.length-1));
    for(const [s,x,yy,c] of pages[filesPage]) text(scr, s, x, yy, c);

      ctext(scr, "page "+(filesPage+1)+"/"+pages.length+" · "+(IS_TOUCH?"▲▼ to turn":"↑↓ to turn"), ROWS-3, "#4d8b68");

  if((t*2|0)%2===0) ctext(scr, IS_TOUCH ? "[ /ROOT to return ]" : "[ tab to return ]", ROWS-2, "#2e5c42");

/* ---------- main loop ---------- */
let last = 0, T = 0;
function frame(ts){
  const dt = Math.min(0.05, (ts-last)/1000||0.016);
  last = ts; T += dt;

  if(mode==="boot"){
    scr.fillStyle = "#020604"; scr.fillRect(0,0,cv.width,cv.height);
    bootT += dt;
    const shown = Math.floor(bootT*12);
    let y = 6;
    bootLines.slice(0, shown).forEach((l,i)=>{
      ctext(scr, l[0], y, l[1]||"#bfe8d4");
      y += i===0 ? 3 : 1.0+((l[0]==="")?0:0);
      y = Math.round(y);
    });
    if((T*2|0)%2===0 && shown<bootLines.length) ctext(scr, "▌", Math.min(6+shown, ROWS-3), "#59f2b0");
  }
  else if(mode==="files"){ drawFilesScreen(T); }
  else if(mode==="reverie"){ drawReverie(dt); }
  else if(mode==="void"){
    scr.fillStyle = "#010503"; scr.fillRect(0,0,cv.width,cv.height);
    for(let i=0;i<160;i++){
      cellText(scr, (Math.random()*COLS)|0, (Math.random()*PR)|0,
               "░·"[(Math.random()*2)|0], "rgba(170,240,200,"+(Math.random()*.16)+")");
    }
    ctext(scr, "N O D E   U N R E A C H A B L E", 12, "#ff8866");
    ctext(scr, "no route yet. the mesh is still growing.", 15, "#bfe8d4");
    ctext(scr, "return after the next night.", 17, "#4d8b68");
    if((T|0)%2===0) ctext(scr, "STATUS: BEING READ", 20, "#ffd166");
    tryMove(dt);
    cellText(scr, player.cx, player.cy, "@", "#9fe8ff", "#010503");
  }
  else if(mode==="play" && room){
    // static layer (with glitch band offsets while glitching)
    if(glitchT>0){
      glitchT -= dt;
      scr.fillStyle = (room.palette&&room.palette.bg)||"#07130c";
      scr.fillRect(0,0,cv.width,cv.height);
      for(let y=0;y<PR;y++){
        const off = (Math.random()<.25 ? ((Math.random()*5|0)-2)*CW : 0);
        scr.drawImage(bgC, 0, y*CH, cv.width, CH, off, y*CH, cv.width, CH);
      }
    } else {
      scr.drawImage(bgC, 0, 0);
    }
    // exits shimmer
    for(const ex of room.exits||[]){
      const horiz = ex.dir==="n"||ex.dir==="s";
      const a = accents();
      for(let k=-2;k<=2;k++){
        const x = horiz? ex._cx+k : ex._cx, y = horiz? ex._cy : ex._cy+k;
        if(ex._open){
          const c = "░▒▓"[(T*4+k+10)%3|0];
          cellText(scr, x, y, c, a[0]);
        } else {
          if((k+((T*3)|0))%2===0) cellText(scr, x, y, "∙", a[1%a.length]);
          if(k===0 && (T*2|0)%2===0) cellText(scr, x, y, "▪", "#ff8866");
        }
      }
    }
    // twinkling base cells (LEDs, cursors)
    for(const tw of twinkles){
      const ph = ((T*tw.rate)|0)%tw.chars.length;
      cellText(scr, tw.x, tw.y, tw.chars[ph], tw.col, cellBg(tw.x, tw.y));
    }
    // memory markers: a warm pulse over anything holding a reverie —
    // warmth in the cold mesh, so the reader can find the memories
    nearMemory = false;
    for(const f of room.features||[]){
      if(f.verb!=="reverie" && !f.scene) continue;
      const my = (f._bbox? f._bbox[1] : f._cy) - 1;
      const pulse = 0.5+0.5*Math.sin(T*2.2 + f._cx);
      const warm = pulse>0.6 ? "#ffb37a" : "#c77a5a";
      cellText(scr, f._cx, my, "✷", warm);   // soft warm sparkle
      cellText(scr, f._cx-1, my, "˚", "rgba(255,190,140,"+(pulse*0.7)+")");
      cellText(scr, f._cx+1, my, "˚", "rgba(255,190,140,"+(pulse*0.7)+")");
      if(pulse>0.85) cellText(scr, f._cx, my-1, "·", "rgba(255,200,150,.6)"); // a rising warm mote
      if(Math.abs(player.cx-f._cx)<=3 && Math.abs(player.cy-f._cy)<=3) nearMemory = true;
    }
    // the file
    if(filePos && !downloading){
      const blinkC = (T*3|0)%2 ? "■" : "▪";
      cellText(scr, filePos[0], filePos[1], blinkC, "#59f2b0", "#0d0d0d");
      if(Math.abs(player.cx-filePos[0])<=1 && Math.abs(player.cy-filePos[1])<=1){
        downloading = {t:0, total:1.8};
        blip(420,.1,"square",.03);
      }
    }
    if(downloading){
      downloading.t += dt;
      const k = Math.min(1, downloading.t/downloading.total);
      const bw = 40;
      const bx = (COLS-bw)>>1, by = PR-3;
      text(scr, "downloading at 300bps", bx, by-1, "#8fd0a8", "#010804");
      let barStr = "";
      for(let i=0;i<bw;i++) barStr += (i/bw<k) ? "█" : "░";
      text(scr, barStr, bx, by, "#59f2b0", "#010804");
      if((downloading.t*6|0)%2===0) blip(560+120*Math.sin(downloading.t*9), .04, "square", .012);
      if(k>=1){
        save.files[room.id] = {name:room.file.name||"unnamed.file", note:room.file.note||""};
        persist(); handshake();
        if(window.ROOT_NATIVE) ROOT_NATIVE.haptic("download");
        say([room.file.name||"", room.file.note||""]);
        downloading = null; filePos = null;
      }
    }
    drawFx(dt);
    drawWeather(dt, T);
    tryMove(dt);
    // the Reader
    const rc = (T*2|0)%2 ? "#9fe8ff" : "#d8fff0";
    cellText(scr, player.cx, player.cy, "@", rc, "#0d0d0d");
    // door-game status header, top right
    if(!photoMode){
      const hdr = " FILES "+Object.keys(save.files).length+" · READ "+Object.keys(save.visited).length+"/"+(manifest?manifest.rooms.length:"?")+" · 300bps ";
      text(scr, hdr, COLS-hdr.length-1, 0, "#8fd0a8", "#020a05");
    }
    // captions
    if(caption){
      caption.t += dt;
      if(!photoMode && caption.t<5){
        text(scr, " "+caption.title+" ", 2, 0, "#ffffff", "#020a05");
        if(caption.region) text(scr, " "+caption.region+" ", 2, 1, "#4d8b68", "#020a05");
      }
    }
  }

  // message area (bottom two rows)
  if(mode==="play"){
    scr.fillStyle = "#010804";
    scr.fillRect(0, PR*CH, cv.width, 2*CH);
    if(nearMemory){
      // standing by a memory always wins the message row — this is how it's found
      const hint = IS_TOUCH ? "something of hers is filed here — QUERY to enter"
                            : "something of hers is filed here — SPACE to enter";
      const on = (T*1.5|0)%2===0;
      ctext(scr, hint, PR, on ? "#f2c69a" : "#c88a5e");
    } else if(msg){
      msg.t += dt;
      if(msg.t > msg.ttl) msg = null;
      else {
        const pi = Math.min(msg.pages.length-1, (msg.t/msg.per)|0);
        msg.pages[pi].forEach((l,i)=>ctext(scr, l, PR+i, "#d8f5e4"));
        if(pi < msg.pages.length-1 && (msg.t*2|0)%2===0)
          cellText(scr, COLS-3, PR+1, "»", "#59f2b0", "#010804");
      }
    } else if(caption && caption.insc && !caption.inscShown && caption.t>1.4){
      caption.inscShown = true;
      say("“"+caption.insc+"”");
    }
  }

  // artpack region title screen, over everything
  if(regionCard && mode==="play"){
    if(photoMode){ regionCard = null; }
    else {
      regionCard.t += dt;
      drawRegionCard();
      if(regionCard.t > 3.4) regionCard = null;
    }
  }

  // transition: character static wipe
  if(trans>0){
    trans -= dt*2.2;
    const n = Math.floor(trans*700);
    for(let i=0;i<n;i++){
      cellText(scr, (Math.random()*COLS)|0, (Math.random()*ROWS)|0,
               "░▒▓█"[(Math.random()*4)|0],
               ["#02100a","#06140c","#0a1f14","#123020"][(Math.random()*4)|0],
               "#010804");
    }
  }

  requestAnimationFrame(frame);
}

/* ---------- input ---------- */
function pressAny(){
  // returns true if the press was consumed by a screen (boot / region card)
  if(mode==="boot"){
    if(!manifest) return true;
    mode = "play"; handshake();
    loadRoom(save.lastRoom && manifest.roomIds[save.lastRoom] ? save.lastRoom : manifest.entry, null);
    return true;
  }
  if(regionCard){ regionCard = null; return true; }
  return false;
}
function toggleFiles(){
  mode = (mode==="files") ? "play" : (mode==="play" ? "files" : mode);
  if(mode==="files") filesPage = 0;
}

const KEYMAP = {ArrowUp:"up",KeyW:"up",ArrowDown:"down",KeyS:"down",ArrowLeft:"left",KeyA:"left",ArrowRight:"right",KeyD:"right"};
addEventListener("keydown", e=>{
  if(pressAny()){ e.preventDefault(); return; }
  if(mode==="reverie"){
    if(["Space","Enter","ArrowRight","ArrowDown","KeyD","KeyS","ArrowLeft","ArrowUp"].includes(e.code)) reverieAdvance();
    e.preventDefault(); return;
  }
  if(e.code==="Tab"){ toggleFiles(); e.preventDefault(); return; }
  if(mode==="files"){
    if(e.code==="ArrowDown"||e.code==="KeyS"||e.code==="ArrowRight"||e.code==="KeyD"){ pageFiles(1); e.preventDefault(); }
    if(e.code==="ArrowUp"||e.code==="KeyW"||e.code==="ArrowLeft"||e.code==="KeyA"){ pageFiles(-1); e.preventDefault(); }
    return;
  }
  if(e.code==="Space"){ interact(); e.preventDefault(); return; }
  if(e.code==="KeyQ"){ save.sound = !save.sound; persist(); say("sound "+(save.sound?"on":"off"), 1.5); return; }
  const k = KEYMAP[e.code]; if(k){ keys[k]=true; e.preventDefault(); }
});
addEventListener("keyup", e=>{ const k = KEYMAP[e.code]; if(k) keys[k]=false; });

/* ---------- touch controls ---------- */
if(IS_TOUCH){
  document.getElementById("pad").style.display = "block";
  document.getElementById("btns").style.display = "block";
  for(const el of document.querySelectorAll("#pad [data-k]")){
    const k = el.dataset.k;
    const STEP = {up:[0,-1], down:[0,1], left:[-1,0], right:[1,0]};
    const down = (e)=>{ e.preventDefault(); if(pressAny()) return;
      if(mode==="files"){ pageFiles(k==="down"||k==="right" ? 1 : -1); return; }
      el.classList.add("held"); keys[k] = true;
      stepT = 0.24;                       // a tap steps once, a hold repeats
      attemptStep(STEP[k][0], STEP[k][1]); };
    const up = (e)=>{ e.preventDefault(); el.classList.remove("held"); keys[k] = false; };
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("pointerleave", up);
  }
  document.getElementById("bQuery").addEventListener("pointerdown", e=>{
    e.preventDefault();
    if(pressAny()) return;
    if(mode==="reverie"){ reverieAdvance(); return; }
    if(mode==="files"){ toggleFiles(); return; }
    interact();
  });
  document.getElementById("bRoot").addEventListener("pointerdown", e=>{
    e.preventDefault();
    if(pressAny()) return;
    toggleFiles();
  });
  cv.addEventListener("pointerdown", e=>{ if(mode==="reverie"){ reverieAdvance(); return; } pressAny(); });
  // no native gestures anywhere: stray taps must never zoom or select
  document.addEventListener("touchstart", e=>{ e.preventDefault(); }, {passive:false});
  document.addEventListener("touchend", e=>{ e.preventDefault(); }, {passive:false});
  document.addEventListener("gesturestart", e=>{ e.preventDefault(); });
  document.addEventListener("dblclick", e=>{ e.preventDefault(); });
}

/* ---------- debug handle (headless testing / iteration) ---------- */
window.DR = {
  player,
  warp(cx, cy){ player.cx = cx|0; player.cy = cy|0; },
  go(id, dir){ loadRoom(id, dir || null); },
  photo(v){ photoMode = !!v; },
  reverie(setting){ enterReverie({setting: setting||"rooftop",
    title:"REVERIE — "+(setting||"rooftop"),
    narr:["A memory surfaces through the mesh, warm and out of order.",
          "She is here, and you are here, and the archive is elsewhere.",
          "You stay a moment. Then the signal calls you back down."]}); },
  compose(sky,land,structure,weather,pose){ enterReverie({sky,land,structure,weather,pose,
    title:"REVERIE — "+[sky,land,structure].join(" · "),
    narr:["A memory surfaces through the mesh, warm and out of order.",
          "She is here, and you are here, and the archive is elsewhere."]}); },
  state(){ return {mode, room: room && room.id, files: Object.keys(save.files), reverie: !!reverie}; }
};

/* ---------- go ---------- */
(async function(){
  try{
    manifest = await fetchJSON("rooms/manifest.json");
    manifest.roomIds = {};
    manifest.rooms.forEach(r=>manifest.roomIds[r.id]=true);
    startBoot();
  }catch(e){
    scr.fillStyle = "#020604"; scr.fillRect(0,0,cv.width,cv.height);
    ctext(scr, "could not load rooms/manifest.json", 14, "#ff8866");
    ctext(scr, "serve this folder over http: python3 -m http.server", 16, "#bfe8d4");
  }
  requestAnimationFrame(frame);
})();
</script>
